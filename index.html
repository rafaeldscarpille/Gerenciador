<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gerenciador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#222228;--surface3:#1c1c22;
  --border:#2e2e38;--border2:#3d3d4d;
  --accent:#c8f060;--accent2:#60d4f0;--accent3:#f060a8;--accent4:#f0a060;--accent5:#a060f0;
  --text:#f0efe8;--text2:#9a99a8;--text3:#5c5b6e;
  --radius:10px;--radius-sm:6px;--sidebar-w:220px;--header-h:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;overflow:hidden;}
header{height:var(--header-h);padding:0 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg);z-index:300;flex-shrink:0;}
.logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
header h1{font-size:14px;font-weight:700;letter-spacing:-0.02em;}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.header-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background 0.3s;flex-shrink:0;}
.sync-dot.syncing{background:var(--accent4);animation:pulse 1s infinite;}
.sync-dot.ok{background:var(--accent);}
.sync-dot.err{background:var(--accent3);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
.menu-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex-shrink:0;}
.menu-btn span{display:block;width:14px;height:1.5px;background:var(--text2);border-radius:1px;transition:all 0.22s;}
.menu-btn.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.menu-btn.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}
.layout{display:flex;flex:1;min-height:0;position:relative;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250;backdrop-filter:blur(2px);}
.sidebar-overlay.show{display:block;}
aside{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--border);padding:14px 0;display:flex;flex-direction:column;gap:1px;background:var(--bg);height:100%;overflow-y:auto;transition:transform 0.25s cubic-bezier(0.4,0,0.2,1),width 0.25s cubic-bezier(0.4,0,0.2,1);position:relative;z-index:260;}
aside.collapsed{width:54px;}
aside.collapsed .nav-name,aside.collapsed .nav-badge,aside.collapsed .nav-del,aside.collapsed .sidebar-label,aside.collapsed .sidebar-divider,aside.collapsed .sidebar-add-text{display:none;}
aside.collapsed .sidebar-add{padding:8px;justify-content:center;}
aside.collapsed .nav-item{justify-content:center;padding:10px 0;}
@media(max-width:640px){aside{position:fixed;top:var(--header-h);left:0;height:calc(100% - var(--header-h));transform:translateX(-100%);z-index:260;width:var(--sidebar-w) !important;}aside.mobile-open{transform:translateX(0);}}
.sidebar-section{margin-bottom:2px;}
.sidebar-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.14em;padding:0 14px 6px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text2);position:relative;transition:background 0.12s,color 0.12s;user-select:none;white-space:nowrap;}
.nav-item:hover{background:var(--surface);color:var(--text);}
.nav-item.active{background:var(--surface);color:var(--text);font-weight:600;}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-icon{font-size:15px;flex-shrink:0;}
.nav-name{flex:1;overflow:hidden;text-overflow:ellipsis;}
.nav-del{font-size:10px;color:var(--text3);width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.12s;flex-shrink:0;}
.nav-item:hover .nav-del{opacity:1;}
.nav-del:hover{background:rgba(240,96,168,0.2);color:var(--accent3);}
.nav-badge{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--surface2);border-radius:9px;padding:1px 6px;flex-shrink:0;}
.sidebar-divider{height:1px;background:var(--border);margin:6px 14px;}
.sidebar-add{margin:6px 10px 0;padding:7px 10px;border:1px dashed var(--border2);border-radius:var(--radius-sm);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;cursor:pointer;transition:all 0.15s;font-family:'DM Mono',monospace;}
.sidebar-add:hover{border-color:var(--accent);color:var(--accent);}
main{flex:1;overflow-y:auto;padding:22px 20px;min-width:0;}
@media(min-width:641px){main{padding:26px 28px;}}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.03em;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
@media(min-width:641px){.page-title{font-size:22px;}}
.badge{font-size:10px;font-family:'DM Mono',monospace;background:var(--accent);color:#0f0f11;border-radius:20px;padding:2px 9px;font-weight:400;}
.task-input-row{display:flex;gap:7px;margin-bottom:14px;}
.task-input-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;color:var(--text);font-size:15px;font-family:'Syne',sans-serif;outline:none;transition:border-color 0.15s;}
.task-input-row input::placeholder{color:var(--text3);}
.task-input-row input:focus{border-color:var(--accent);}
.btn{padding:10px 16px;background:var(--accent);color:#0f0f11;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity 0.15s;-webkit-tap-highlight-color:transparent;}
.btn:hover{opacity:0.85;}
.btn-ghost{padding:8px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.task-list{display:flex;flex-direction:column;gap:7px;}
.task-block{display:flex;flex-direction:column;animation:fadeIn 0.18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.task-card{display:flex;align-items:flex-start;gap:9px;padding:12px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:border-color 0.15s;position:relative;}
.task-card:hover{border-color:var(--border2);}
.task-card.done-card{opacity:0.4;}
.task-card.has-sub{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent;}
.task-cb{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:2px;}
.task-text-wrap{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.task-text{font-size:14px;line-height:1.45;word-break:break-word;}
.task-card.done-card .task-text{text-decoration:line-through;color:var(--text2);}
.task-rename-inp{background:transparent;border:none;border-bottom:1px solid var(--accent);outline:none;color:var(--text);font-size:14px;font-family:'Syne',sans-serif;padding:1px 2px;width:100%;}
/* Pedido fields */
.task-pedido-fields{display:flex;flex-direction:column;gap:5px;margin-top:4px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);}
.task-pedido-row{display:flex;align-items:center;gap:6px;}
.task-pedido-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;width:90px;}
.task-pedido-inp{background:var(--surface3);border:1px solid var(--border);border-radius:4px;outline:none;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;padding:4px 8px;flex:1;transition:border-color 0.15s;}
.task-pedido-inp:focus{border-color:var(--accent5);}
.task-pedido-inp.valor{color:var(--accent);}
.task-pedido-inp.gasto{color:var(--accent2);}
/* Tags */
.task-tag{font-size:9px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;}
.task-tag.contas{background:rgba(96,212,240,0.12);color:var(--accent2);border:1px solid rgba(96,212,240,0.25);}
.task-tag.trabalhos{background:rgba(240,160,96,0.12);color:var(--accent4);border:1px solid rgba(240,160,96,0.25);}
.task-tag.entregas{background:rgba(240,96,168,0.12);color:var(--accent3);border:1px solid rgba(240,96,168,0.25);}
.task-tag.pedidos{background:rgba(160,96,240,0.12);color:var(--accent5);border:1px solid rgba(160,96,240,0.25);}
.task-tag.none{background:var(--surface2);color:var(--text3);border:1px solid var(--border2);}
.sub-prog{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.sub-prog-bar{width:32px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.sub-prog-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width 0.3s;}
.sub-prog-text{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);}
.task-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;}
@media(min-width:641px){.task-actions{opacity:0;transition:opacity 0.15s;}.task-card:hover .task-actions{opacity:1;}}
.tact{font-size:10px;color:var(--text3);cursor:pointer;padding:4px 7px;border-radius:4px;font-family:'DM Mono',monospace;white-space:nowrap;transition:all 0.15s;border:none;background:transparent;-webkit-tap-highlight-color:transparent;}
.tact:active,.tact:hover{background:var(--surface2);color:var(--text2);}
.tact.del:active,.tact.del:hover{background:rgba(240,96,168,0.15);color:var(--accent3);}
.tact.dup:active,.tact.dup:hover{background:rgba(200,240,96,0.1);color:var(--accent);}
.tact.sub:active,.tact.sub:hover{background:rgba(96,212,240,0.1);color:var(--accent2);}
.tact.ren:active,.tact.ren:hover{background:rgba(240,160,96,0.1);color:var(--accent4);}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.subtask-area{background:var(--surface3);border:1px solid var(--border);border-top:none;border-bottom-left-radius:var(--radius);border-bottom-right-radius:var(--radius);padding:2px 12px 10px 12px;}
.subtask-list{display:flex;flex-direction:column;gap:4px;padding-top:5px;}
.subtask-row{display:flex;align-items:center;}
.sub-connector{flex-shrink:0;}
.subtask-card{flex:1;display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);transition:border-color 0.15s;}
.subtask-card:hover{border-color:var(--border2);}
.subtask-card.done-sub{opacity:0.38;}
.sub-cb{width:13px;height:13px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.sub-text{flex:1;font-size:12px;color:var(--text2);}
.subtask-card.done-sub .sub-text{text-decoration:line-through;color:var(--text3);}
.sub-rename-inp{flex:1;background:transparent;border:none;border-bottom:1px solid var(--accent2);outline:none;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;padding:1px 2px;}
.sub-actions{display:flex;align-items:center;gap:1px;}
@media(min-width:641px){.sub-actions{opacity:0;transition:opacity 0.12s;}.subtask-card:hover .sub-actions{opacity:1;}}
.sub-act{font-size:9px;color:var(--text3);cursor:pointer;padding:3px 5px;border-radius:3px;font-family:'DM Mono',monospace;transition:all 0.15s;border:none;background:transparent;}
.sub-act.sub-ren:active,.sub-act.sub-ren:hover{background:rgba(240,160,96,0.1);color:var(--accent4);}
.sub-act.sub-del:active,.sub-act.sub-del:hover{background:rgba(240,96,168,0.15);color:var(--accent3);}
.sub-add-row{display:flex;gap:5px;margin-top:7px;padding-left:26px;}
.sub-add-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:border-color 0.15s;}
.sub-add-row input::placeholder{color:var(--text3);}
.sub-add-row input:focus{border-color:var(--accent2);}
.sub-add-row button{padding:6px 12px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--accent2);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.sub-add-row button:hover{background:rgba(96,212,240,0.1);border-color:var(--accent2);}
.empty{padding:40px 0;text-align:center;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace;border:1px dashed var(--border);border-radius:var(--radius);}
.tag-dropdown{position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);z-index:400;min-width:150px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,0.5);}
.tag-opt{padding:10px 14px;font-size:13px;font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--text2);transition:background 0.1s;}
.tag-opt:hover,.tag-opt:active{background:var(--surface3);color:var(--text);}
.tag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* History */
.hist-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.hist-tab{padding:7px 14px;border:1px solid var(--border2);border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.hist-tab.active.pedidos{border-color:var(--accent5);color:var(--accent5);background:rgba(160,96,240,0.07);}
.hist-tab.active.entregas{border-color:var(--accent3);color:var(--accent3);background:rgba(240,96,168,0.07);}
.hist-tab.active.all{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,0.07);}
.hist-slot{margin-bottom:16px;}
.hist-slot-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hist-slot-num{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;}
.hist-slot-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.hist-slot-clear{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;cursor:pointer;margin-left:auto;padding:3px 9px;border-radius:4px;transition:all 0.15s;}
.hist-slot-clear:hover{background:rgba(240,96,168,0.15);color:var(--accent3);}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.hist-task-row{display:flex;align-items:flex-start;gap:9px;}
.hist-check{color:var(--accent);font-size:14px;flex-shrink:0;margin-top:1px;}
.hist-task-info{flex:1;}
.hist-task-name{font-size:13px;text-decoration:line-through;color:var(--text2);}
.hist-task-subs{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.hist-task-tag{font-size:9px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:9px;flex-shrink:0;}
.hist-task-tag.entregas{background:rgba(240,96,168,0.1);color:var(--accent3);}
.hist-task-tag.pedidos{background:rgba(160,96,240,0.1);color:var(--accent5);}
.hist-money-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
.hist-money-item{display:flex;flex-direction:column;gap:2px;padding:6px 10px;border-radius:var(--radius-sm);flex:1;min-width:90px;}
.hist-money-item.pago{background:rgba(200,240,96,0.07);border:1px solid rgba(200,240,96,0.15);}
.hist-money-item.custo{background:rgba(96,212,240,0.07);border:1px solid rgba(96,212,240,0.15);}
.hist-money-item.lucro{background:rgba(160,96,240,0.07);border:1px solid rgba(160,96,240,0.15);}
.hist-money-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
.hist-money-val{font-size:14px;font-weight:700;}
.hist-money-item.pago .hist-money-val{color:var(--accent);}
.hist-money-item.custo .hist-money-val{color:var(--accent2);}
.hist-money-item.lucro .hist-money-val{color:var(--accent5);}
.hist-empty{padding:36px 0;text-align:center;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace;border:1px dashed var(--border);border-radius:var(--radius);line-height:1.8;}
.hist-tag-group{margin-bottom:20px;}
.hist-group-label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.hist-group-label.pedidos{color:var(--accent5);}
.hist-group-label.entregas{color:var(--accent3);}
.hist-group-label::after{content:'';flex:1;height:1px;background:var(--border);}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.card-title{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.field label{font-size:11px;color:var(--text2);}
.field input,.field select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 11px;color:var(--text);font-size:14px;font-family:'Syne',sans-serif;outline:none;transition:border-color 0.15s;width:100%;}
.field input::placeholder{color:var(--text3);}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field select option{background:var(--surface2);}
.field-row{display:flex;gap:8px;}
.field-row .field{flex:1;}
.fil-list{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.fil-item{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;animation:fadeIn 0.18s ease;}
.fil-dot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);flex-shrink:0;}
.fil-name{flex:1;color:var(--text);}
.fil-price{color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;}
.fil-del{color:var(--text3);cursor:pointer;font-size:11px;padding:3px 7px;border-radius:3px;font-family:'DM Mono',monospace;}
.fil-del:hover{background:rgba(240,96,168,0.15);color:var(--accent3);}
/* Orçamento */
.calc-section{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.calc-line{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.calc-line-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.calc-line-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);}
.calc-rm-line{font-size:10px;color:var(--text3);cursor:pointer;padding:3px 7px;border-radius:3px;font-family:'DM Mono',monospace;border:none;background:transparent;}
.calc-rm-line:hover{background:rgba(240,96,168,0.15);color:var(--accent3);}
.calc-line-fields{display:flex;gap:8px;align-items:flex-end;}
.calc-line-fields .field{margin-bottom:0;}
.calc-add-line-btn{width:100%;padding:9px;border:1px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--accent2);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all 0.15s;text-align:center;}
.calc-add-line-btn:hover{border-color:var(--accent2);background:rgba(96,212,240,0.07);}
.result-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:none;animation:fadeIn 0.22s ease;margin-top:16px;}
.result-section.show{display:block;}
.result-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:11px;}
.result-breakdown{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.result-cost{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.result-cost strong{color:var(--text);}
.result-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.result-card{padding:13px;border-radius:var(--radius);border:1px solid var(--border2);}
.result-card.pj{border-color:rgba(96,212,240,0.3);background:rgba(96,212,240,0.05);}
.result-card.pf{border-color:rgba(200,240,96,0.3);background:rgba(200,240,96,0.05);}
.rc-label{font-size:9px;font-family:'DM Mono',monospace;margin-bottom:5px;}
.result-card.pj .rc-label{color:var(--accent2);}
.result-card.pf .rc-label{color:var(--accent);}
.rc-val{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.result-card.pj .rc-val{color:var(--accent2);}
.result-card.pf .rc-val{color:var(--accent);}
.rc-orig{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-top:3px;text-decoration:line-through;}
/* Transfer to pedido modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:420px;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
/* Vendas charts */
.vendas-period{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.period-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);cursor:pointer;transition:all 0.15s;background:transparent;}
.period-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,0.07);}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.stat-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.stat-val.green{color:var(--accent);}
.stat-val.blue{color:var(--accent2);}
.stat-val.purple{color:var(--accent5);}
.stat-val.orange{color:var(--accent4);}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.chart-title{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;}
.chart-wrap{position:relative;height:200px;}
/* Loading */
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999;}
.loading-logo{width:44px;height:44px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.loading-text{font-size:13px;color:var(--text3);font-family:'DM Mono',monospace;}
.loading-bar{width:160px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.loading-fill{height:100%;background:var(--accent);border-radius:2px;animation:loadbar 1.2s ease infinite;}
@keyframes loadbar{0%{width:0;margin-left:0;}50%{width:100%;margin-left:0;}100%{width:0;margin-left:100%;}}
</style>
</head>
<body>
<div id="loadingScreen"><div class="loading-logo">✦</div><div class="loading-bar"><div class="loading-fill"></div></div><div class="loading-text">conectando ao Firebase...</div></div>
<header>
  <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
  <div class="logo">✦</div>
  <h1>Gerenciador</h1>
  <div class="header-right"><div class="sync-dot" id="syncDot"></div><span class="header-date" id="headerDate"></span></div>
</header>
<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside id="sidebar"></aside>
  <main id="mainContent"></main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeAplxiFMOw9wTpIPC1OwYGx61M9yLFEI",
  authDomain: "gerenciador-f5b8d.firebaseapp.com",
  projectId: "gerenciador-f5b8d",
  storageBucket: "gerenciador-f5b8d.firebasestorage.app",
  messagingSenderId: "912215513420",
  appId: "1:912215513420:web:96fa9c5ea98d3fe70e97e9"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db, "gerenciador", "dados");

const HIST_TAGS = ['pedidos','entregas'];
const TAG_LABELS = { none:'sem tag', contas:'Contas', trabalhos:'Trabalhos', entregas:'Entregas', pedidos:'Pedidos' };
const MAX_HIST = 2;
const isMobile = () => window.innerWidth <= 640;

let state = {
  tabs:[
    {id:'historico',name:'Histórico',fixed:true,icon:'🗂️'},
    {id:'vendas',name:'Vendas',fixed:true,icon:'📊'},
    {id:'pedidos',name:'Pedidos',fixed:true,icon:'📦',tasks:[]},
    {id:'orcamentos',name:'Orçamentos',fixed:true,icon:'🧮'},
    {id:'filamentos',name:'Filamentos',fixed:true,icon:'🎨'},
    {id:'tab1',name:'Minhas Tarefas',fixed:false,icon:'✅',tasks:[]}
  ],
  activeTab:'tab1', filaments:[], nextTabId:2, history:[]
};
let saveTimeout=null, ignoreNextSnapshot=false, sidebarCollapsed=false;
let chartInstances={};

// ── Sidebar ──
const menuBtn=document.getElementById('menuBtn');
const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('sidebarOverlay');
function toggleSidebar(){
  if(isMobile()){
    const open=sidebar.classList.contains('mobile-open');
    sidebar.classList.toggle('mobile-open',!open);
    overlay.classList.toggle('show',!open);
    menuBtn.classList.toggle('open',!open);
  } else {
    sidebarCollapsed=!sidebarCollapsed;
    sidebar.classList.toggle('collapsed',sidebarCollapsed);
    menuBtn.classList.toggle('open',sidebarCollapsed);
  }
}
menuBtn.addEventListener('click',toggleSidebar);
overlay.addEventListener('click',()=>{sidebar.classList.remove('mobile-open');overlay.classList.remove('show');menuBtn.classList.remove('open');});

function setSyncDot(s){const d=document.getElementById('syncDot');if(!d)return;d.className='sync-dot '+s;}

function migrate(s){
  const fixedDefs=[
    {id:'historico',name:'Histórico',fixed:true,icon:'🗂️'},
    {id:'vendas',name:'Vendas',fixed:true,icon:'📊'},
    {id:'pedidos',name:'Pedidos',fixed:true,icon:'📦',tasks:[]},
    {id:'orcamentos',name:'Orçamentos',fixed:true,icon:'🧮'},
    {id:'filamentos',name:'Filamentos',fixed:true,icon:'🎨'},
  ];
  if(!s.tabs) s.tabs=[];
  fixedDefs.forEach(def=>{
    const existing=s.tabs.find(t=>t.id===def.id);
    if(!existing){ s.tabs.splice(fixedDefs.indexOf(def),0,def); }
    else if(def.tasks&&!existing.tasks){ existing.tasks=[]; }
  });
  s.tabs.forEach(tab=>{
    if(tab.tasks) tab.tasks.forEach(t=>{
      if(!t.subtasks) t.subtasks=[];
      if(t._subOpen===undefined) t._subOpen=false;
      if(!t.tag) t.tag='none';
      if(t._renaming===undefined) t._renaming=false;
      // legacy valor → valorPago
      if(t.valor!==undefined && t.valorPago===undefined){t.valorPago=t.valor;delete t.valor;}
      if(t.valorPago===undefined) t.valorPago='';
      if(t.gramasGastas===undefined) t.gramasGastas='';
      t.subtasks.forEach(sub=>{if(sub._renaming===undefined) sub._renaming=false;});
    });
  });
  if(!s.history) s.history=[];
  s.history.forEach(h=>{
    if(h.valor!==undefined && h.valorPago===undefined){h.valorPago=h.valor;delete h.valor;}
    if(!h.valorPago) h.valorPago='';
    if(!h.gramasGastas) h.gramasGastas='';
    if(!h.custoPorGrama) h.custoPorGrama=0;
  });
  if(!s.filaments) s.filaments=[];
  return s;
}

function save(){
  setSyncDot('syncing');
  ignoreNextSnapshot=true; // block incoming snapshot immediately
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{
      const clean=JSON.parse(JSON.stringify(state));
      clean.tabs.forEach(tab=>{if(tab.tasks) tab.tasks.forEach(t=>{delete t._subOpen;delete t._renaming;(t.subtasks||[]).forEach(s=>delete s._renaming);});});
      await setDoc(DOC_REF,clean);
      setSyncDot('ok');
      // allow snapshots again after a short delay
      setTimeout(()=>{ ignoreNextSnapshot=false; }, 2000);
    }catch(e){console.error(e);setSyncDot('err');ignoreNextSnapshot=false;}
  },800);
}

async function init(){
  try{
    const snap=await getDoc(DOC_REF);
    if(snap.exists()) state=migrate(snap.data());
    else {
      // first time: save default state
      await setDoc(DOC_REF, JSON.parse(JSON.stringify(state)));
    }
    document.getElementById('loadingScreen').style.display='none';
    setSyncDot('ok'); render();
    onSnapshot(DOC_REF,snap=>{
      if(ignoreNextSnapshot){
        // don't reset flag here — save() resets after 2s
        return;
      }
      if(snap.exists()){
        const prev=state.activeTab;
        state=migrate(snap.data());
        state.activeTab=prev;
        render();
      }
    });
  }catch(e){console.error(e);document.querySelector('.loading-text').textContent='Erro ao conectar.';setSyncDot('err');}
}

function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){return new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtR(v){return 'R$ '+(parseFloat(v)||0).toFixed(2);}
document.getElementById('headerDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});

// ── History ──
function addToHistory(task,tabName){
  if(!HIST_TAGS.includes(task.tag)) return;
  // calc custo: if gramasGastas is set, use filament cost — otherwise 0
  const entry={
    id:uid(), taskText:task.text, tag:task.tag,
    valorPago:task.valorPago||'', gramasGastas:task.gramasGastas||'',
    custoPorGrama:task.custoPorGrama||0,
    subtasks:(task.subtasks||[]).map(s=>({text:s.text,done:s.done})),
    completedAt:Date.now(), tabName
  };
  const sameTag=state.history.filter(h=>h.tag===task.tag);
  if(sameTag.length>=MAX_HIST){
    const oldest=sameTag.sort((a,b)=>a.completedAt-b.completedAt)[0];
    state.history=state.history.filter(h=>h.id!==oldest.id);
  }
  state.history.unshift(entry);
}

// ── Render ──
function render(){renderSidebar();renderMain();}

function renderSidebar(){
  const aside=document.getElementById('sidebar');
  let html=`<div class="sidebar-section"><div class="sidebar-label">Páginas</div>`;
  state.tabs.filter(t=>t.fixed).forEach(tab=>{
    html+=`<div class="nav-item${tab.id===state.activeTab?' active':''}" data-nav="${tab.id}"><span class="nav-icon">${tab.icon}</span><span class="nav-name">${esc(tab.name)}</span></div>`;
  });
  html+=`</div><div class="sidebar-divider"></div><div class="sidebar-section"><div class="sidebar-label">Listas</div>`;
  state.tabs.filter(t=>!t.fixed).forEach(tab=>{
    const pending=tab.tasks?tab.tasks.filter(t=>!t.done).length:0;
    html+=`<div class="nav-item${tab.id===state.activeTab?' active':''}" data-nav="${tab.id}">
      <span class="nav-icon">${tab.icon}</span><span class="nav-name">${esc(tab.name)}</span>
      ${pending>0?`<span class="nav-badge">${pending}</span>`:''}
      <span class="nav-del" data-del="${tab.id}">✕</span>
    </div>`;
  });
  html+=`</div><div class="sidebar-add" id="addTabBtn"><span>+</span><span class="sidebar-add-text"> nova lista</span></div>`;
  aside.innerHTML=html;
  aside.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',e=>{if(e.target.dataset.del){removeTab(e.target.dataset.del);return;}navTo(el.dataset.nav);});
  });
  aside.querySelectorAll('[data-del]').forEach(el=>{el.addEventListener('click',e=>{e.stopPropagation();removeTab(el.dataset.del);});});
  document.getElementById('addTabBtn')?.addEventListener('click',addTab);
}

function navTo(tabId){
  state.activeTab=tabId;
  if(isMobile()){sidebar.classList.remove('mobile-open');overlay.classList.remove('show');menuBtn.classList.remove('open');}
  render();
}

function renderMain(){
  const main=document.getElementById('mainContent');
  // destroy existing charts
  Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});
  chartInstances={};
  const tabId=state.activeTab;
  if(tabId==='historico'){main.innerHTML=buildHistHTML();bindHistEvents();return;}
  if(tabId==='vendas'){main.innerHTML=buildVendasHTML();bindVendasEvents();return;}
  if(tabId==='orcamentos'){main.innerHTML=buildOrcHTML();bindOrcEvents();return;}
  if(tabId==='pedidos'){main.innerHTML=buildPedidosHTML();bindPedidosEvents();return;}
  if(tabId==='filamentos'){main.innerHTML=buildFilamentosHTML();bindFilamentosEvents();return;}
  const tab=state.tabs.find(t=>t.id===tabId);
  if(tab){main.innerHTML=buildListHTML(tab);bindListEvents(tab.id);}
}

function addTab(){
  const name=prompt('Nome da nova lista:');
  if(!name||!name.trim()) return;
  const icons=['📋','🎯','💡','🔧','📦','⚡','🚀','📝','🛒','🎨'];
  const id='tab'+(state.nextTabId++);
  state.tabs.push({id,name:name.trim(),fixed:false,icon:icons[Math.floor(Math.random()*icons.length)],tasks:[]});
  state.activeTab=id;save();render();
}
function removeTab(id){
  if(!confirm('Remover esta lista?')) return;
  state.tabs=state.tabs.filter(t=>t.id!==id);
  if(state.activeTab===id) state.activeTab=state.tabs[0].id;
  save();render();
}

// ── Checklist ──
function countAll(tab){let total=0,done=0;(tab.tasks||[]).forEach(t=>{total++;if(t.done)done++;(t.subtasks||[]).forEach(s=>{total++;if(s.done)done++;});});return{total,done};}

function buildListHTML(tab){
  const{total,done}=countAll(tab);
  const pct=total>0?Math.round((done/total)*100):0;
  const items=(tab.tasks||[]).map(task=>buildTaskHTML(task,tab.id)).join('');
  return `<div class="page-title">${tab.icon} ${esc(tab.name)}${total>0?`<span class="badge">${done}/${total} — ${pct}%</span>`:''}</div>
    <div class="task-input-row"><input type="text" id="newTask_${tab.id}" placeholder="Nova tarefa..." autocomplete="off"><button class="btn" id="addTaskBtn_${tab.id}">+</button></div>
    <div class="task-list" id="taskList_${tab.id}">${items||'<div class="empty">Nenhuma tarefa ainda.</div>'}</div>`;
}

function buildTaskHTML(task,tabId){
  const subs=task.subtasks||[];
  const subDone=subs.filter(s=>s.done).length,subTotal=subs.length;
  const showSub=subTotal>0||task._subOpen;
  const tag=task.tag||'none';
  const isPedido=tag==='pedidos';
  const progHTML=subTotal>0?`<div class="sub-prog"><div class="sub-prog-bar"><div class="sub-prog-fill" style="width:${Math.round((subDone/subTotal)*100)}%"></div></div><span class="sub-prog-text">${subDone}/${subTotal}</span></div>`:'';
  const textHTML=task._renaming?`<input class="task-rename-inp" id="ren_${task.id}" data-renid="${task.id}" data-tabid="${tabId}" value="${esc(task.text)}">`:`<span class="task-text">${esc(task.text)}</span>`;
  const pedidoFieldsHTML=isPedido?`<div class="task-pedido-fields">
    <div class="task-pedido-row">
      <span class="task-pedido-label">💰 Valor pago</span>
      <input class="task-pedido-inp valor" type="number" min="0" step="0.01" placeholder="R$ 0,00" data-pedfield="valorPago" data-taskid="${task.id}" data-tabid="${tabId}" value="${esc(task.valorPago||'')}">
    </div>
    <div class="task-pedido-row">
      <span class="task-pedido-label">⚖️ Gramas usadas</span>
      <input class="task-pedido-inp gasto" type="number" min="0" step="1" placeholder="0 g" data-pedfield="gramasGastas" data-taskid="${task.id}" data-tabid="${tabId}" value="${esc(task.gramasGastas||'')}">
    </div>
  </div>`:'';
  let subsHTML='';
  if(showSub){
    const subItems=subs.map((s,i)=>{
      const isLast=i===subs.length-1&&!task._subOpen;
      const subContent=s._renaming?`<input class="sub-rename-inp" id="subren_${s.id}" data-subrenid="${s.id}" data-taskid="${task.id}" data-tabid="${tabId}" value="${esc(s.text)}">`:`<span class="sub-text">${esc(s.text)}</span>`;
      return `<div class="subtask-row"><div class="sub-connector"><svg width="26" height="28" viewBox="0 0 26 28" style="display:block;flex-shrink:0;"><path d="M13 0 L13 14 L26 14" fill="none" stroke="#3d3d4d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>${!isLast?`<line x1="13" y1="14" x2="13" y2="28" stroke="#3d3d4d" stroke-width="1.5"/>`:''}
</svg></div><div class="subtask-card${s.done?' done-sub':''}"><input class="sub-cb" type="checkbox" ${s.done?'checked':''} data-subid="${s.id}" data-taskid="${task.id}" data-tabid="${tabId}">${subContent}<div class="sub-actions"><button class="sub-act sub-ren" data-subrenbtn="${s.id}" data-taskid="${task.id}" data-tabid="${tabId}">ren</button><button class="sub-act sub-del" data-subdel="${s.id}" data-taskid="${task.id}" data-tabid="${tabId}">✕</button></div></div></div>`;
    }).join('');
    const addInp=task._subOpen?`<div class="sub-add-row"><input type="text" id="newSub_${task.id}" placeholder="Nova subtarefa..." autocomplete="off"><button data-addsubmit="${task.id}" data-tabid="${tabId}">+ add</button></div>`:'';
    subsHTML=`<div class="subtask-area"><div class="subtask-list">${subItems}</div>${addInp}</div>`;
  }
  return `<div class="task-block" id="block_${task.id}"><div class="task-card${task.done?' done-card':''}${showSub?' has-sub':''}" id="card_${task.id}" style="position:relative;"><input class="task-cb" type="checkbox" ${task.done?'checked':''} data-taskid="${task.id}" data-tabid="${tabId}" style="margin-top:2px;"><div class="task-text-wrap">${textHTML}${pedidoFieldsHTML}</div><div class="task-meta">${progHTML}<button class="task-tag ${tag}" data-tagbtn="${task.id}" data-tabid="${tabId}">${TAG_LABELS[tag]}</button><div class="task-actions"><button class="tact ren" data-renbtn="${task.id}" data-tabid="${tabId}">✎</button><button class="tact sub" data-subbtn="${task.id}" data-tabid="${tabId}">↳</button><button class="tact dup" data-dupbtn="${task.id}" data-tabid="${tabId}">⧉</button><button class="tact del" data-delbtn="${task.id}" data-tabid="${tabId}">✕</button></div></div></div>${subsHTML}</div>`;
}

function bindListEvents(tabId){
  const btn=document.getElementById('addTaskBtn_'+tabId);
  const inp=document.getElementById('newTask_'+tabId);
  if(btn) btn.addEventListener('click',()=>addTask(tabId));
  if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')addTask(tabId);});

  document.querySelectorAll('.task-cb').forEach(cb=>{
    cb.addEventListener('change',()=>{
      const tab=state.tabs.find(t=>t.id===cb.dataset.tabid);
      const task=tab?.tasks.find(t=>t.id===cb.dataset.taskid);
      if(!task) return;
      task.done=cb.checked;
      if(task.done&&HIST_TAGS.includes(task.tag)){addToHistory(task,tab.name);tab.tasks=tab.tasks.filter(t=>t.id!==task.id);}
      save();render();
    });
  });

  // Pedido fields
  document.querySelectorAll('.task-pedido-inp').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const tab=state.tabs.find(t=>t.id===inp.dataset.tabid);
      const task=tab?.tasks.find(t=>t.id===inp.dataset.taskid);
      if(task){task[inp.dataset.pedfield]=inp.value;save();}
    });
  });

  document.querySelectorAll('[data-delbtn]').forEach(el=>{
    el.addEventListener('click',()=>{const tab=state.tabs.find(t=>t.id===el.dataset.tabid);if(tab){tab.tasks=tab.tasks.filter(t=>t.id!==el.dataset.delbtn);save();render();}});
  });
  document.querySelectorAll('[data-dupbtn]').forEach(el=>{
    el.addEventListener('click',()=>{
      const tab=state.tabs.find(t=>t.id===el.dataset.tabid);if(!tab) return;
      const idx=tab.tasks.findIndex(t=>t.id===el.dataset.dupbtn);if(idx===-1) return;
      const orig=tab.tasks[idx];
      tab.tasks.splice(idx+1,0,{id:uid(),text:orig.text+' (cópia)',done:false,tag:orig.tag||'none',valorPago:'',gramasGastas:'',custoPorGrama:0,_subOpen:false,_renaming:false,subtasks:(orig.subtasks||[]).map(s=>({id:uid(),text:s.text,done:false,_renaming:false}))});
      save();render();
    });
  });
  document.querySelectorAll('[data-renbtn]').forEach(el=>{
    el.addEventListener('click',()=>{
      const tab=state.tabs.find(t=>t.id===el.dataset.tabid);const task=tab?.tasks.find(t=>t.id===el.dataset.renbtn);if(!task) return;
      tab.tasks.forEach(t=>{t._renaming=false;});task._renaming=!task._renaming;render();
      setTimeout(()=>{const i=document.getElementById('ren_'+task.id);if(i){i.focus();i.select();}},30);
    });
  });
  document.querySelectorAll('[data-renid]').forEach(inp=>{
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')commitRename(inp.dataset.renid,inp.dataset.tabid,inp.value);if(e.key==='Escape')cancelRename(inp.dataset.renid,inp.dataset.tabid);});
    inp.addEventListener('blur',()=>setTimeout(()=>commitRename(inp.dataset.renid,inp.dataset.tabid,inp.value),120));
    inp.focus();inp.select();
  });
  document.querySelectorAll('[data-tagbtn]').forEach(el=>{
    el.addEventListener('click',e=>{

let histFilter='all';
function buildHistHTML(){
  const filters=[{key:'all',label:'Todos',cls:'all'},{key:'pedidos',label:'Pedidos',cls:'pedidos'},{key:'entregas',label:'Entregas',cls:'entregas'}];
  const tabsHTML=filters.map(f=>`<button class="hist-tab ${f.cls}${histFilter===f.key?' active':''}" data-hfilter="${f.key}">${f.label}</button>`).join('');
  let filtered=histFilter==='all'?state.history:state.history.filter(h=>h.tag===histFilter);
  let content='';
  if(filtered.length===0){content=`<div class="hist-empty">Nenhum pedido ou entrega concluído ainda.</div>`;}
  else if(histFilter==='all'){
    const groups={pedidos:[],entregas:[]};filtered.forEach(h=>{if(groups[h.tag]) groups[h.tag].push(h);});
    if(groups.pedidos.length) content+=`<div class="hist-tag-group"><div class="hist-group-label pedidos">Pedidos</div>${buildHistSlots(groups.pedidos)}</div>`;
    if(groups.entregas.length) content+=`<div class="hist-tag-group"><div class="hist-group-label entregas">Entregas</div>${buildHistSlots(groups.entregas)}</div>`;
  } else {content=buildHistSlots(filtered);}
  return `<div class="page-title">🗂️ Histórico</div><div class="hist-tabs">${tabsHTML}</div>${content}`;
}
function buildHistSlots(entries){
  return entries.slice(0,MAX_HIST).map((entry,idx)=>{
    const pago=parseFloat(entry.valorPago)||0;
    const grama=parseFloat(entry.gramasGastas)||0;
    const custo=entry.custoPorGrama?grama*entry.custoPorGrama:0;
    const lucro=pago-custo;
    const subHTML=entry.subtasks&&entry.subtasks.length>0?`<div class="hist-task-subs">${entry.subtasks.length} subtarefa${entry.subtasks.length>1?'s':''}: ${entry.subtasks.map(s=>esc(s.text)).join(', ')}</div>`:'';
    const moneyHTML=(pago>0||grama>0)?`<div class="hist-money-row">${pago>0?`<div class="hist-money-item pago"><div class="hist-money-label">Valor pago</div><div class="hist-money-val">${fmtR(pago)}</div></div>`:''}${grama>0?`<div class="hist-money-item custo"><div class="hist-money-label">Gramas usadas</div><div class="hist-money-val">${grama}g</div></div>`:''}${(pago>0&&custo>0)?`<div class="hist-money-item lucro"><div class="hist-money-label">Lucro estimado</div><div class="hist-money-val">${fmtR(lucro)}</div></div>`:''}</div>`:'';
    return `<div class="hist-slot"><div class="hist-slot-header"><span class="hist-slot-num">slot ${idx+1}</span><span class="hist-slot-date">${fmtDate(entry.completedAt)}</span><span class="hist-slot-clear" data-histclear="${entry.id}">limpar</span></div><div class="hist-card"><div class="hist-task-row"><span class="hist-check">✓</span><div class="hist-task-info"><div class="hist-task-name">${esc(entry.taskText)}</div><div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;">${esc(entry.tabName)}</div>${subHTML}${moneyHTML}</div><span class="hist-task-tag ${entry.tag}">${TAG_LABELS[entry.tag]}</span></div></div></div>`;
  }).join('');
}
function bindHistEvents(){
  document.querySelectorAll('[data-hfilter]').forEach(btn=>{btn.addEventListener('click',()=>{histFilter=btn.dataset.hfilter;renderMain();});});
  document.querySelectorAll('[data-histclear]').forEach(btn=>{btn.addEventListener('click',()=>{if(!confirm('Limpar este slot?')) return;state.history=state.history.filter(h=>h.id!==btn.dataset.histclear);save();renderMain();});});

let vendasPeriod=6; // months
function calcEntryCusto(h){
  // Use custoPorGrama if available (set when created from orçamento)
  // Otherwise estimate from filaments: average cost/g across all registered filaments
  const g=parseFloat(h.gramasGastas)||0;
  if(g===0) return 0;
  if(h.custoPorGrama&&h.custoPorGrama>0) return g*h.custoPorGrama;
  // fallback: average of all registered filament costs
  if(state.filaments.length===0) return 0;
  const avgPricePerKg=state.filaments.reduce((s,f)=>s+f.price,0)/state.filaments.length;
  return g*(avgPricePerKg/1000);
}

function getVendasData(months){
  const now=new Date();const labels=[];const pedidos=[];const receita=[];const custoArr=[];const lucroArr=[];
  for(let i=months-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const label=d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
    labels.push(label);
    const monthEntries=state.history.filter(h=>{
      const hd=new Date(h.completedAt);
      return hd.getFullYear()===d.getFullYear()&&hd.getMonth()===d.getMonth()&&h.tag==='pedidos';
    });
    pedidos.push(monthEntries.length);
    const r=monthEntries.reduce((s,h)=>s+(parseFloat(h.valorPago)||0),0);
    // Use proper custo calculation per entry
    const c=monthEntries.reduce((s,h)=>s+calcEntryCusto(h),0);
    receita.push(parseFloat(r.toFixed(2)));
    custoArr.push(parseFloat(c.toFixed(2)));
    lucroArr.push(parseFloat((r-c).toFixed(2)));
  }
  return{labels,pedidos,receita,custo:custoArr,lucro:lucroArr};
}

  return `<div class="page-title">🧮 Orçamentos</div>
    ${!hasFilaments?`<div style="font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:16px;">Cadastre filamentos na aba <strong style="color:var(--text2)">🎨 Filamentos</strong> primeiro.</div>`:''}
    <div class="calc-section" id="calcLines">${linesHTML}</div>
    <button class="calc-add-line-btn" id="addCalcLine">+ adicionar filamento ao projeto</button>
    <div style="margin-top:14px;">
      <div class="field" style="position:relative;"><label>Desconto — opcional</label><div style="display:flex;"><input type="number" id="calcDiscount" placeholder="0" min="0" max="100" step="0.1" style="border-radius:var(--radius-sm) 0 0 var(--radius-sm);border-right:none;"><div style="padding:0 10px;background:var(--surface3);border:1px solid var(--border);border-left:none;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:13px;color:var(--text2);font-family:'DM Mono',monospace;display:flex;align-items:center;">%</div></div></div>
      <button class="btn" id="calcBtn" style="width:100%;margin-top:4px;">Calcular preços</button>
    </div>
    <div class="result-section" id="calcResult">
      <div class="result-label">Resultado do projeto</div>
      <div class="result-breakdown" id="resultBreakdown"></div>
      <div class="result-cost" id="resultCost"></div>
      <div class="result-cards">
        <div class="result-card pj"><div class="rc-label">Preço PJ — custo × 3</div><div class="rc-val" id="pjVal">—</div><div class="rc-orig" id="pjOrig"></div></div>
        <div class="result-card pf"><div class="rc-label">Pessoa física — custo × 5</div><div class="rc-val" id="pfVal">—</div><div class="rc-orig" id="pfOrig"></div></div>
      </div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
        <button class="btn-ghost" id="transferPedidoBtn" style="width:100%">📦 Transferir para Pedidos</button>
      </div>
    </div>`;
}
function buildCalcLineHTML(line,idx){
  const filOpts=state.filaments.map(f=>`<option value="${f.id}" ${line.filId===f.id?'selected':''}>${esc(f.name)} — R$ ${f.price.toFixed(2)}/kg</option>`).join('');
  const dot=line.filId?state.filaments.find(f=>f.id===line.filId):null;
  const canRemove=calcLines.length>1;
  return `<div class="calc-line" data-lineid="${line.id}"><div class="calc-line-header"><span class="calc-line-label">${dot?`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${dot.color};margin-right:5px;vertical-align:middle;border:1px solid rgba(255,255,255,0.15);"></span>`:''}filamento ${idx+1}</span>${canRemove?`<button class="calc-rm-line" data-lineid="${line.id}">✕ remover</button>`:''}</div><div class="calc-line-fields"><div class="field" style="flex:1;margin-bottom:0;"><label>Filamento</label><select class="calc-fil-sel" data-lineid="${line.id}"><option value="">Selecione...</option>${filOpts}</select></div><div class="field" style="flex:0 0 100px;margin-bottom:0;"><label>Gramas (g)</label><input type="number" class="calc-grams-inp" data-lineid="${line.id}" placeholder="150" min="0" step="1" value="${line.grams||''}"></div></div></div>`;
}
function bindOrcEvents(){
  document.getElementById('addCalcLine')?.addEventListener('click',()=>{calcLines.push({id:'cl'+Date.now(),filId:'',grams:''});refreshCalcLines();});
  bindCalcLineEvents();
  document.getElementById('calcBtn')?.addEventListener('click',calcOrc);
  document.getElementById('calcDiscount')?.addEventListener('input',calcOrc);
  document.getElementById('transferPedidoBtn')?.addEventListener('click',openTransferModal);
}
function refreshCalcLines(){const c=document.getElementById('calcLines');if(!c) return;c.innerHTML=calcLines.map((l,i)=>buildCalcLineHTML(l,i)).join('');bindCalcLineEvents();}
function bindCalcLineEvents(){
  document.querySelectorAll('.calc-fil-sel').forEach(sel=>{sel.addEventListener('change',()=>{const line=calcLines.find(l=>l.id===sel.dataset.lineid);if(line){line.filId=sel.value;refreshCalcLines();}});});
  document.querySelectorAll('.calc-grams-inp').forEach(inp=>{inp.addEventListener('input',()=>{const line=calcLines.find(l=>l.id===inp.dataset.lineid);if(line) line.grams=inp.value;});});
  document.querySelectorAll('.calc-rm-line').forEach(btn=>{btn.addEventListener('click',()=>{calcLines=calcLines.filter(l=>l.id!==btn.dataset.lineid);refreshCalcLines();document.getElementById('calcResult')?.classList.remove('show');lastCalcResult=null;});});
}
function calcOrc(){
  const discountPct=Math.min(100,Math.max(0,parseFloat(document.getElementById('calcDiscount')?.value)||0));
  const result=document.getElementById('calcResult');
  const validLines=calcLines.map(line=>{const fil=state.filaments.find(f=>f.id===line.filId);const grams=parseFloat(line.grams)||0;if(!fil||grams<=0) return null;return{fil,grams,cost:(fil.price/1000)*grams};}).filter(Boolean);
  if(validLines.length===0){result?.classList.remove('show');lastCalcResult=null;return;}
  const totalCost=validLines.reduce((s,l)=>s+l.cost,0);
  const pj=totalCost*3,pf=totalCost*5;
  const m=1-(discountPct/100);
  const pjF=pj*m,pfF=pf*m;
  const totalGrams=validLines.reduce((s,l)=>s+l.grams,0);
  const avgCostPerGrama=totalGrams>0?totalCost/totalGrams:0;
  lastCalcResult={validLines,totalCost,totalGrams,avgCostPerGrama,pjF,pfF,discountPct};
  const bd=document.getElementById('resultBreakdown');
  if(bd) bd.innerHTML=validLines.map(l=>`<div style="display:flex;align-items:center;gap:8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);"><div style="width:9px;height:9px;border-radius:50%;background:${l.fil.color};border:1px solid rgba(255,255,255,0.15);flex-shrink:0;"></div><span style="flex:1;">${esc(l.fil.name)}</span><span>${l.grams}g</span><span style="color:var(--text);min-width:72px;text-align:right;">R$ ${l.cost.toFixed(2)}</span></div>`).join('')+(validLines.length>1?`<div style="border-top:1px solid var(--border);padding-top:6px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-top:4px;">${validLines.length} filamentos · ${totalGrams.toFixed(0)}g total</div>`:'');
  document.getElementById('resultCost').innerHTML=`Custo total: <strong>R$ ${totalCost.toFixed(2)}</strong>${discountPct>0?` &nbsp;|&nbsp; Desconto: <strong>${discountPct}%</strong>`:''}`;
  document.getElementById('pjVal').textContent='R$ '+pjF.toFixed(2);
  document.getElementById('pfVal').textContent='R$ '+pfF.toFixed(2);
  document.getElementById('pjOrig').textContent=discountPct>0?`sem desconto: R$ ${pj.toFixed(2)}`:'';
  document.getElementById('pfOrig').textContent=discountPct>0?`sem desconto: R$ ${pf.toFixed(2)}`:'';
  result.classList.add('show');
}

// ── Transfer to Pedido ──
function openTransferModal(){
  if(!lastCalcResult){alert('Calcule primeiro.');return;}
  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.innerHTML=`<div class="modal">
    <div class="modal-title">📦 Enviar para Pedidos</div>
    <div class="field"><label>Nome do projeto / cliente</label><input type="text" id="transferName" placeholder="ex: Suporte para notebook" autocomplete="off"></div>
    <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);line-height:2;margin-bottom:4px;">
      ${lastCalcResult.validLines.map(l=>`<div style="display:flex;align-items:center;gap:7px;"><div style="width:8px;height:8px;border-radius:50%;background:${l.fil.color};flex-shrink:0;border:1px solid rgba(255,255,255,0.15);"></div><span style="flex:1;color:var(--text2);">${esc(l.fil.name)}</span><span>${l.grams}g</span><span style="color:var(--text);width:80px;text-align:right;">R$ ${l.cost.toFixed(2)}</span></div>`).join('')}
      <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;">
        <span style="color:var(--text3);">${lastCalcResult.totalGrams.toFixed(0)}g · custo R$ ${lastCalcResult.totalCost.toFixed(2)}</span>
        <span style="color:var(--accent);font-weight:700;">Sugerido R$ ${lastCalcResult.pfF.toFixed(2)}</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="transferConfirm" style="flex:1">Confirmar pedido</button>
      <button class="btn-ghost" id="transferCancel">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('transferName')?.focus(),50);
  document.getElementById('transferCancel').addEventListener('click',()=>modal.remove());
  document.getElementById('transferConfirm').addEventListener('click',()=>{
    const name=document.getElementById('transferName').value.trim();
    if(!name){document.getElementById('transferName').focus();return;}
    const pedidosTab=state.tabs.find(t=>t.id==='pedidos');
    if(!pedidosTab){alert('Aba Pedidos não encontrada.');return;}
    if(!pedidosTab.tasks) pedidosTab.tasks=[];
    const subtasks=lastCalcResult.validLines.map(l=>({id:uid(),text:`${l.fil.name} — ${l.grams}g (R$ ${l.cost.toFixed(2)})`,done:false,_renaming:false}));
    pedidosTab.tasks.push({
      id:uid(), text:name, done:false, tag:'pedidos',
      valorPago:lastCalcResult.pfF.toFixed(2),
      gramasGastas:lastCalcResult.totalGrams.toFixed(0),
      custoPorGrama:lastCalcResult.avgCostPerGrama,
      subtasks, _subOpen:true, _renaming:false
    });
    save(); modal.remove(); navTo('pedidos');
  });
}

init();
</script>
</body>
</html>
